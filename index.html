<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>S-201 Observation Rift - Input Mode</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --bg-color: #050a0a;
            --glow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* CRT 濾鏡與掃描線 */
        #screen-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
        }

        #screen-container::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none; z-index: 100;
        }

        /* 輸入介面樣式 */
        #input-overlay {
            position: absolute;
            z-index: 50;
            text-align: center;
            width: 80%;
            max-width: 600px;
            transition: opacity 1s ease, transform 1s ease;
        }

        .terminal-label {
            color: var(--primary-color);
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: var(--glow);
            letter-spacing: 2px;
        }

        input[type="text"] {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px;
            width: 100%;
            font-size: 20px;
            font-family: inherit;
            outline: none;
            box-shadow: inset var(--glow);
            text-align: center;
        }

        button {
            margin-top: 30px;
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
        }

        button:hover {
            box-shadow: var(--glow);
            transform: scale(1.05);
        }

        /* 觀測資訊樣式 */
        .ui-element {
            position: absolute;
            color: var(--primary-color);
            font-size: 12px;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
        }

        .active-ui { opacity: 0.8; }

        #coherence-panel { top: 20px; right: 20px; text-align: right; }
        #system-log { top: 20px; left: 20px; }

        canvas {
            display: block;
            filter: blur(0.4px);
        }

        /* 隱藏元素 */
        .hidden {
            opacity: 0 !important;
            transform: scale(0.9);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="screen-container">
    <!-- 第一階段：輸入框 -->
    <div id="input-overlay">
        <div class="terminal-label">S-201 投射：請輸入欲觀測之可能性情境</div>
        <input type="text" id="user-input" placeholder="例如：若當年沒有選擇離開..." autocomplete="off">
        <br>
        <button onclick="startEntanglement()">確定觀測</button>
    </div>

    <!-- 第二階段：觀測 UI -->
    <div id="system-log" class="ui-element">
        MODE: QUANTUM OBSERVATION<br>
        PATH: UNIVERSE_REMNANT_#7721<br>
        STATUS: <span id="status-text">WAITING...</span>
    </div>

    <div id="coherence-panel" class="ui-element">
        COHERENCE LEVEL
        <div style="width:150px; height:4px; background:#111; margin-top:5px;">
            <div id="coherence-bar" style="width:0%; height:100%; background:var(--primary-color);"></div>
        </div>
        <span id="coherence-pct">0.00%</span>
    </div>

    <canvas id="observationCanvas"></canvas>

    <div id="instruction" class="ui-element" style="bottom: 30px; width:100%; text-align:center;">
        [ 持續按壓螢幕以凝聚波函數 ]
    </div>
</div>

<script>
    const canvas = document.getElementById('observationCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    let isObserving = false;
    let isSystemReady = false;
    let coherence = 0;
    let targetText = "";

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 粒子類別
    class Particle {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.tx = this.x; this.ty = this.y;
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = (Math.random() - 0.5) * 1.5;
            this.size = Math.random() * 2;
        }
        update() {
            if (isObserving && isSystemReady) {
                this.x += (this.tx - this.x) * 0.07;
                this.y += (this.ty - this.y) * 0.07;
            } else {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
        }
        draw() {
            ctx.fillStyle = `rgba(0, 255, 204, ${isObserving ? 0.8 : 0.3})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    // 初始化粒子
    for (let i = 0; i < 2000; i++) particles.push(new Particle());

    // 第一階段到第二階段的轉場
    function startEntanglement() {
        const inputVal = document.getElementById('user-input').value;
        if (!inputVal) return;

        // 模擬系統對輸入內容的回饋
        targetText = `[觀測中]: ${inputVal} ... 那端的茉莉花開了。`;

        // UI 切換
        document.getElementById('input-overlay').classList.add('hidden');
        
        setTimeout(() => {
            document.querySelectorAll('.ui-element').forEach(el => el.classList.add('active-ui'));
            document.getElementById('status-text').innerText = "ENTANGLING...";
            prepareText(targetText);
            isSystemReady = true;
        }, 1000);
    }

    function prepareText(msg) {
        ctx.clearRect(0,0,width,height);
        ctx.fillStyle = "#fff";
        ctx.font = "24px 'Microsoft JhengHei', sans-serif";
        ctx.textAlign = "center";
        
        // 簡單斷句處理
        const x = width / 2;
        const y = height / 2;
        ctx.fillText(msg, x, y);

        const imageData = ctx.getImageData(0, 0, width, height).data;
        let points = [];
        for (let i = 0; i < height; i += 4) {
            for (let j = 0; j < width; j += 4) {
                if (imageData[(i * width + j) * 4] > 128) {
                    points.push({x: j, y: i});
                }
            }
        }

        particles.forEach((p, idx) => {
            if (idx < points.length) {
                p.tx = points[idx].x;
                p.ty = points[idx].y;
            } else {
                p.tx = Math.random() * width;
                p.ty = Math.random() * height;
            }
        });
    }

    function animate() {
        ctx.fillStyle = 'rgba(5, 10, 10, 0.2)';
        ctx.fillRect(0, 0, width, height);

        if (isObserving && isSystemReady) {
            coherence = Math.min(coherence + 0.4, 42.15 + Math.random());
            document.getElementById('status-text').innerText = "COLLAPSING...";
        } else if (isSystemReady) {
            coherence = Math.max(coherence - 1.5, 0);
            document.getElementById('status-text').innerText = "STABLE NOISE";
        }

        document.getElementById('coherence-bar').style.width = coherence + "%";
        document.getElementById('coherence-pct').innerText = coherence.toFixed(2) + "%";

        particles.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    // 監聽互動
    const startObs = () => { if(isSystemReady) isObserving = true; };
    const endObs = () => isObserving = false;

    window.addEventListener('mousedown', startObs);
    window.addEventListener('mouseup', endObs);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); startObs(); });
    window.addEventListener('touchend', endObs);

    animate();
</script>

</body>
</html>
